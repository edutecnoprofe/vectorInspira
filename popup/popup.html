<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-content">
    <div class="popup-header">
      <h2>Guardar Imagen</h2>
    </div>

    <div class="popup-body">
      <div class="section-label">Tags existentes:</div>
      <div id="tags-container"></div>

      <div class="new-tag-section">
        <div class="section-label">Nuevo tag:</div>
        <input type="text" id="new-tag-input" placeholder="Escribe uno o varios tags separados por coma + Enter">
        <div id="selected-tags" class="selected-tags-list"></div>
      </div>
    </div>

    <div class="popup-footer">
      <div id="status-message" class="status-message"></div>
      <div class="form-actions">
        <button id="btn-save">Guardar</button>
        <button id="btn-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
